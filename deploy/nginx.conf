# ── Gzip compression ────────────────────────────────────────────────────────
# Enabled at the http{} level in the real nginx.conf; these settings belong
# here for reference.  If you manage a single server block, add them inside
# the server{} block instead.
#
#   gzip on;
#   gzip_vary on;
#   gzip_proxied any;
#   gzip_comp_level 6;
#   gzip_types text/plain text/css text/javascript application/javascript
#              application/json application/xml image/svg+xml;
#   gzip_min_length 1024;
#
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name 187.127.76.76 srv1614440.hstgr.cloud;

    root /var/www/clinic/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    # Adjust the CSP below to match your font/API origins.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data:; \
         connect-src 'self';"
        always;

    # ── Backend API — proxy to Node.js ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── React SPA — serve index.html for all client-side routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache immutable static assets (Vite content-hashed filenames) ────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
